<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Sister & Paithiyam🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(-45deg, #ff758c, #ff7eb3, #6a11cb, #2575fc);
  background-size: 400% 400%;
  animation: gradientBG 8s ease infinite;
  color: white;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  text-align: center;
  max-width: 500px;
  animation: fadeIn 2s ease-in-out;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);} 
  to {opacity: 1; transform: translateY(0);} 
}

h1 {
  font-size: 2.5em;
}

.subtitle {
  font-size: 1.2em;
  margin-bottom: 20px;
}

.gallery {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 20px auto;
  width: 280px;
  height: 280px;
  position: relative;
}

.gallery img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 20px;
  opacity: 0;
  transition: opacity 1s ease-in-out, transform 1s;
}

.gallery img.active {
  opacity: 1;
  transform: scale(1.08);
}

.message {
  font-size: 1.1em;
  margin: 20px 0;
  min-height: 80px;
}

button.main-btn {
  margin-top: 20px;
  padding: 14px 35px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  background: linear-gradient(45deg, #ff4e50, #f9d423);
  color: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  transition: 0.3s;
}

button.main-btn:hover {
  transform: scale(1.1);
}

#surprise {
  display: none;
  margin-top: 20px;
  font-size: 1.4em;
  animation: pop 1s ease forwards;
}

@keyframes pop {
  0% {transform: scale(0); opacity: 0;}
  100% {transform: scale(1); opacity: 1;}
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -20px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(0); opacity: 1;}
  100% {transform: translateY(-100vh); opacity: 0;}
}

</style>
</head>

<body>

<div class="container">
  <h1>🎂 Happy Birthday Sister 🎉</h1>
  <div class="subtitle">This is just for you, PRIZA 🤍</div>

  <div class="gallery">
    <img src="1.jpg" class="active">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
  </div>

  <div class="message" id="text"></div>

  <button class="main-btn" onclick="showSurprise()">🎁 Open Your Surprise 🎁</button>

  <div id="surprise">
    🎈 You are my best friend forever,Sister,Mom,Supporter,Motivater,Power and So Many....... 😊🤍 🎈
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// Slideshow
let index = 0;
const images = document.querySelectorAll('.gallery img');
setInterval(() => {
  images[index].classList.remove('active');
  index = (index + 1) % images.length;
  images[index].classList.add('active');
}, 2500);

// Typewriter
const message = "Hey PRIZA… we’ve fought over the smallest things, laughed at the dumbest jokes, but through everything… you’ve always been my person. I’m lucky to have you.😊";
let i = 0;
function typeMessage() {
  if (i < message.length) {
    document.getElementById('text').innerHTML += message.charAt(i);
    i++;
    setTimeout(typeMessage, 40);
  }
}
typeMessage();

function showSurprise() {
  document.getElementById('surprise').style.display = 'block';
  document.getElementById('music').play();
  createHearts();
}

// Floating hearts effect
function createHearts() {
  for (let i = 0; i < 20; i++) {
    let heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = '🤍';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }
}
</script>

</body>
</html>
