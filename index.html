<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday PRIZA 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(-45deg,#ff758c,#ff7eb3,#6a11cb,#2575fc);
  background-size:400% 400%;
  animation:bg 8s ease infinite;
  color:#fff;
  text-align:center;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

#intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#intro button{
  padding:16px 32px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#ff4e50,#f9d423);
  color:#fff;
  cursor:pointer;
}

.container{
  display:none;
  max-width:600px;
  margin:auto;
  padding:40px 20px;
}

.gallery{
  width:300px;
  height:300px;
  margin:30px auto;
  position:relative;
}

.gallery img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain; /* FULL IMAGE no crop */
  opacity:0;
  transition:opacity 1s ease-in-out;
}

.gallery img.active{
  opacity:1;
}

.message{
  margin:20px 0;
}

.main-btn{
  margin-top:20px;
  padding:14px 35px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#ff4e50,#f9d423);
  color:#fff;
  cursor:pointer;
}

#surprise{
  display:none;
  margin-top:20px;
  font-size:1.4em;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="intro">
  <button onclick="startSite()">🎁 Tap to Open Surprise 🎁</button>
</div>

<canvas id="fx"></canvas>

<div class="container" id="main">
  <h1>🎂 Happy Birthday PRIZA 🎉</h1>
  <p>This is just for you 💖</p>

  <!-- SLIDESHOW -->
  <div class="gallery">
    <img src="1.jpg" class="active">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
    <img src="5.jpg">
    <img src="6.jpg">
    <img src="7.jpg">
    <img src="8.jpg">
    <img src="9.jpg">
    <img src="10.jpg">
    <img src="11.jpg">
    <img src="12.jpg">
    <img src="13.jpg">
    <img src="14.jpg">
    <img src="15.jpg">
    <img src="16.jpg">
    <img src="17.jpg">
  </div>

  <div class="message" id="text"></div>

  <button class="main-btn" onclick="showSurprise()">🎁 Open Your Surprise 🎁</button>

  <div id="surprise">🎆 Happy Birthday PRIZA! ❤️ 🎆</div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function startSite(){
  document.getElementById('intro').style.display='none';
  document.getElementById('main').style.display='block';
  document.getElementById('music').play(); // MUSIC STARTS HERE
  typeMessage();
}

// slideshow (3 sec)
let index=0;
const imgs=document.querySelectorAll('.gallery img');
setInterval(()=>{
  imgs[index].classList.remove('active');
  index=(index+1)%imgs.length;
  imgs[index].classList.add('active');
},3000);

// typing
const msg="Hey PRIZA… from childhood to now, you’ve always been my favorite person.";
let i=0;
function typeMessage(){
  if(i<msg.length){
    document.getElementById('text').innerHTML+=msg.charAt(i);
    i++;setTimeout(typeMessage,40);
  }
}

function showSurprise(){
  document.getElementById('surprise').style.display='block';
  fireworks();
}

// fireworks
const c=document.getElementById('fx');
const ctx=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;
let p=[];
function fireworks(){
  for(let i=0;i<120;i++){
    p.push({x:c.width/2,y:c.height/2,dx:(Math.random()-.5)*10,dy:(Math.random()-.5)*10,life:100});
  }
  animate();
}
function animate(){
  ctx.clearRect(0,0,c.width,c.height);
  p.forEach(a=>{a.x+=a.dx;a.y+=a.dy;a.life--;ctx.fillRect(a.x,a.y,3,3)});
  p=p.filter(a=>a.life>0);
  requestAnimationFrame(animate);
}
</script>

</body>
</html>
