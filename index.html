<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday PRIZA 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:linear-gradient(-45deg,#ff758c,#ff7eb3,#6a11cb,#2575fc);background-size:400% 400%;animation:bg 8s ease infinite;color:#fff;min-height:100vh}
@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* Intro */
#intro{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:10}
#intro button{padding:16px 32px;border:none;border-radius:30px;background:linear-gradient(45deg,#ff4e50,#f9d423);color:#fff;font-size:18px;cursor:pointer}

.container{display:none;max-width:900px;margin:0 auto;padding:30px 20px;text-align:center}

h1{font-size:2.5em;margin-bottom:10px}
.subtitle{opacity:.9;margin-bottom:20px}

/* CENTERED GRID (handles 17 photos) */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:15px;
  justify-items:center;
  align-items:center;
  margin:30px auto;
}

.gallery img{
  width:140px;
  height:140px;
  object-fit:cover; /* grid needs crop for uniform look */
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,.3);
  transition:.3s;
}
.gallery img:hover{transform:scale(1.08)}

.message{margin:20px 0;line-height:1.6}

button.main-btn{margin-top:20px;padding:14px 35px;border:none;border-radius:30px;background:linear-gradient(45deg,#ff4e50,#f9d423);color:#fff;cursor:pointer}

#surprise{display:none;margin-top:20px;font-size:1.4em}

canvas{position:fixed;top:0;left:0;pointer-events:none}
</style>
</head>
<body>

<div id="intro">
  <button onclick="startSite()">🎁 Tap to Open Surprise 🎁</button>
</div>

<canvas id="fx"></canvas>

<div class="container" id="main">
  <h1>🎂 Happy Birthday PRIZA 🎉</h1>
  <div class="subtitle">This is just for you 💖</div>

  <!-- ADD ALL 17 IMAGES HERE -->
  <div class="gallery">
    <img src="1.jpg"><img src="2.jpg"><img src="3.jpg"><img src="4.jpg">
    <img src="5.jpg"><img src="6.jpg"><img src="7.jpg"><img src="8.jpg">
    <img src="9.jpg"><img src="10.jpg"><img src="11.jpg"><img src="12.jpg">
    <img src="13.jpg"><img src="14.jpg"><img src="15.jpg"><img src="16.jpg">
    <img src="17.jpg">
  </div>

  <div class="message" id="text"></div>

  <button class="main-btn" onclick="showSurprise()">🎁 Open Your Surprise 🎁</button>

  <div id="surprise">🎆 Happy Birthday PRIZA! You deserve everything ❤️ 🎆</div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function startSite(){
  document.getElementById('intro').style.display='none';
  document.getElementById('main').style.display='block';
  typeMessage();
}

// typing
const msg="Hey PRIZA… from childhood memories to today, you’ve always been my favorite person. I’m lucky to have you.";
let i=0;
function typeMessage(){
  if(i<msg.length){
    document.getElementById('text').innerHTML+=msg.charAt(i);
    i++;setTimeout(typeMessage,40);
  }
}

function showSurprise(){
  document.getElementById('surprise').style.display='block';
  document.getElementById('music').play();
  fireworks();
}

// simple fireworks
const c=document.getElementById('fx');
const ctx=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;
let p=[];
function fireworks(){
  for(let i=0;i<120;i++){
    p.push({x:c.width/2,y:c.height/2,dx:(Math.random()-.5)*10,dy:(Math.random()-.5)*10,life:100});
  }
  animate();
}
function animate(){
  ctx.clearRect(0,0,c.width,c.height);
  p.forEach(a=>{a.x+=a.dx;a.y+=a.dy;a.life--;ctx.fillRect(a.x,a.y,3,3)});
  p=p.filter(a=>a.life>0);
  requestAnimationFrame(animate);
}
</script>

</body>
</html>
