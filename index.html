<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday PRIZA 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(-45deg, #ff758c, #ff7eb3, #6a11cb, #2575fc);
  background-size: 400% 400%;
  animation: bg 8s ease infinite;
  color: white;
}

@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* Intro Screen */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#intro button {
  padding: 16px 32px;
  font-size: 18px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #ff4e50, #f9d423);
  color: white;
  cursor: pointer;
}

/* Main Content */
.container {
  display: none;
  max-width: 1000px;
  margin: auto;
  padding: 30px 20px;
  text-align: center;
}

h1 {
  font-size: 2.5em;
}

.subtitle {
  margin-bottom: 20px;
}

/* Gallery */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  margin: 30px auto;
}

.gallery img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* Message */
.message {
  margin: 20px 0;
  line-height: 1.6;
}

/* Button */
.main-btn {
  margin-top: 20px;
  padding: 14px 35px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #ff4e50, #f9d423);
  color: white;
  cursor: pointer;
  font-size: 16px;
}

/* Surprise */
#surprise {
  display: none;
  margin-top: 20px;
  font-size: 1.4em;
}

/* Fireworks canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<!-- Intro -->
<div id="intro">
  <button onclick="startSite()">🎁 Tap to Open Surprise 🎁</button>
</div>

<canvas id="fx"></canvas>

<!-- Main -->
<div class="container" id="main">
  <h1>🎂 Happy Birthday PRIZA 🎉</h1>
  <div class="subtitle">This is just for you 💖</div>

  <div class="gallery">
    <!-- ADD YOUR 17 IMAGES -->
    <img src="1.jpg"><img src="2.jpg"><img src="3.jpg"><img src="4.jpg">
    <img src="5.jpg"><img src="6.jpg"><img src="7.jpg"><img src="8.jpg">
    <img src="9.jpg"><img src="10.jpg"><img src="11.jpg"><img src="12.jpg">
    <img src="13.jpg"><img src="14.jpg"><img src="15.jpg"><img src="16.jpg">
    <img src="17.jpg">
  </div>

  <div class="message" id="text"></div>

  <button class="main-btn" onclick="showSurprise()">🎁 Open Your Surprise 🎁</button>

  <div id="surprise">🎆 Happy Birthday PRIZA! You mean everything ❤️ 🎆</div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// Start
function startSite() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "block";
  typeMessage();
}

// Typing
const msg = "Hey PRIZA… from childhood memories to today, you’ve always been my favorite person. I’m lucky to have you.";
let i = 0;

function typeMessage() {
  if (i < msg.length) {
    document.getElementById("text").innerHTML += msg.charAt(i);
    i++;
    setTimeout(typeMessage, 40);
  }
}

// Surprise
function showSurprise() {
  document.getElementById("surprise").style.display = "block";
  document.getElementById("music").play();
  fireworks();
}

// Fireworks
const c = document.getElementById("fx");
const ctx = c.getContext("2d");
c.width = window.innerWidth;
c.height = window.innerHeight;

let p = [];

function fireworks() {
  for (let i = 0; i < 120; i++) {
    p.push({
      x: c.width / 2,
      y: c.height / 2,
      dx: (Math.random() - 0.5) * 10,
      dy: (Math.random() - 0.5) * 10,
      life: 100
    });
  }
  animate();
}

function animate() {
  ctx.clearRect(0, 0, c.width, c.height);
  p.forEach(a => {
    a.x += a.dx;
    a.y += a.dy;
    a.life--;
    ctx.fillRect(a.x, a.y, 3, 3);
  });
  p = p.filter(a => a.life > 0);
  requestAnimationFrame(animate);
}
</script>

</body>
</html>
