<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday PRIZA 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(-45deg, #ff758c, #ff7eb3, #6a11cb, #2575fc);
  background-size: 400% 400%;
  animation: gradientBG 8s ease infinite;
  color: white;
  min-height: 100vh;
}

@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#intro button {
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #ff4e50, #f9d423);
  color: white;
  cursor: pointer;
}

.container {
  text-align: center;
  max-width: 500px;
  margin: auto;
  padding: 40px 20px;
  display: none;
}

.gallery {
  width: 280px;
  height: 280px;
  margin: 20px auto;
  position: relative;
}

.gallery img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 20px;
  opacity: 0;
  transition: opacity 1s ease-in-out;
}

.gallery img.active {
  opacity: 1;
}

.message {
  margin: 20px 0;
}

button.main-btn {
  margin-top: 20px;
  padding: 14px 35px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #ff4e50, #f9d423);
  color: white;
  cursor: pointer;
}

#surprise {
  display: none;
  font-size: 1.5em;
  margin-top: 20px;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="intro">
  <button onclick="startSite()">🎁 Tap to Open Surprise 🎁</button>
</div>

<canvas id="fireworks"></canvas>

<div class="container" id="main">
  <h1>🎂 Happy Birthday PRIZA 🎉</h1>
  <p>This is just for you 💖</p>

  <div class="gallery">
    <img src="1.jpg" class="active">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
  </div>

  <div class="message" id="text"></div>

  <button class="main-btn" onclick="showSurprise()">🎁 Open Your Surprise 🎁</button>

  <div id="surprise">🎆 Happy Birthday PRIZA! You deserve the world ❤️ 🎆</div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function startSite() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  typeMessage();
}

// slideshow
let index = 0;
const images = document.querySelectorAll('.gallery img');
setInterval(() => {
  images[index].classList.remove('active');
  index = (index + 1) % images.length;
  images[index].classList.add('active');
}, 2500);

// typing
const message = "Hey PRIZA… you’ve always been my strength, my happiness, and my best friend. I’m lucky to have you.";
let i = 0;
function typeMessage() {
  if (i < message.length) {
    document.getElementById('text').innerHTML += message.charAt(i);
    i++;
    setTimeout(typeMessage, 40);
  }
}

function showSurprise() {
  document.getElementById('surprise').style.display = 'block';
  document.getElementById('music').play();
  startFireworks();
}

// fireworks
const canvas = document.getElementById('fireworks');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function startFireworks() {
  for (let i = 0; i < 100; i++) {
    particles.push({
      x: canvas.width / 2,
      y: canvas.height / 2,
      dx: (Math.random() - 0.5) * 8,
      dy: (Math.random() - 0.5) * 8,
      life: 100
    });
  }
  animate();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;
    p.life--;
    ctx.fillRect(p.x, p.y, 3, 3);
  });
  particles = particles.filter(p => p.life > 0);
  requestAnimationFrame(animate);
}
</script>

</body>
</html>
