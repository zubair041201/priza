<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sister 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(-45deg, #ff758c, #ff7eb3, #6a11cb, #2575fc);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  color: white;
  overflow: hidden;
}

@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

#intro button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  background: linear-gradient(45deg, #ff4e50, #f9d423);
  color: white;
}

.container {
  text-align: center;
  padding: 40px 20px;
  display: none;
}

h1 {
  font-size: 2.5em;
}

.subtitle {
  font-size: 1.2em;
  margin-bottom: 20px;
}

.gallery {
  position: relative;
  width: 240px;
  height: 240px;
  margin: 30px auto;
}

.gallery img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 20px;
  opacity: 0;
  transition: opacity 1s ease-in-out, transform 1s;
}

.gallery img.active {
  opacity: 1;
  transform: scale(1.05);
}

.message {
  font-size: 1.1em;
  max-width: 90%;
  margin: auto;
  line-height: 1.6;
  min-height: 80px;
}

button.main-btn {
  margin-top: 25px;
  padding: 10px 25px;
  border: none;
  border-radius: 25px;
  font-size: 15px;
  cursor: pointer;
  background: white;
  color: #ff4e50;
}

#surprise {
  display: none;
  margin-top: 20px;
  font-size: 1.3em;
}

</style>
</head>

<body>

<!-- Intro Screen -->
<div id="intro">
  <button onclick="startExperience()">Tap to Open 🎁</button>
</div>

<!-- Main Content -->
<div class="container" id="main">
  <h1>🎂 Happy Birthday Sister 🎉</h1>
  <div class="subtitle">This is just for you My SISTER </div>

  <div class="gallery">
    <img src="1.jpg" class="active">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
  </div>

  <div class="message" id="text"></div>

  <button class="main-btn" onclick="showSurprise()">Open Your Surprise 🎁</button>

  <div id="surprise">
    🎈 No matter what happens, I’ll always be there for you. My SISTER,PAITHIYAM❤️ 🎈
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// Intro start
function startExperience() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('music').play();
  typeMessage();
}

// Slideshow
let index = 0;
const images = document.querySelectorAll('.gallery img');
setInterval(() => {
  images[index].classList.remove('active');
  index = (index + 1) % images.length;
  images[index].classList.add('active');
}, 2500);

// Typewriter message
const message = "We’ve fought over the smallest things, laughed at the dumbest jokes, but through everything… you’ve always been my person. I’m lucky to have you.";
let i = 0;

function typeMessage() {
  if (i < message.length) {
    document.getElementById('text').innerHTML += message.charAt(i);
    i++;
    setTimeout(typeMessage, 40);
  }
}

function showSurprise() {
  document.getElementById('surprise').style.display = 'block';
}
</script>

</body>
</html>
